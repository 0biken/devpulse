
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dp-bg: var(--color-background-tertiary);
    --dp-surface: var(--color-background-primary);
    --dp-border: var(--color-border-tertiary);
    --dp-border-hover: var(--color-border-secondary);
    --dp-text: var(--color-text-primary);
    --dp-muted: var(--color-text-secondary);
    --dp-hint: var(--color-text-tertiary);
    --dp-green: #1D9E75;
    --dp-amber: #BA7517;
    --dp-blue: #185FA5;
    --dp-purple: #534AB7;
    --dp-coral: #993C1D;
  }
  #dp-root { font-family: var(--font-sans); background: var(--dp-bg); min-height: 520px; border-radius: var(--border-radius-lg); overflow: hidden; }
  .dp-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--dp-surface); border-bottom: 0.5px solid var(--dp-border); }
  .dp-brand { display: flex; align-items: center; gap: 8px; }
  .dp-logo { font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--dp-green); letter-spacing: -0.3px; }
  .dp-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dp-green); animation: dp-pulse 2s infinite; }
  @keyframes dp-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .dp-timer { font-family: var(--font-mono); font-size: 12px; color: var(--dp-muted); display: flex; align-items: center; gap: 6px; }
  .dp-timer-val { color: var(--dp-amber); font-weight: 500; }
  .dp-tabs { display: flex; gap: 2px; padding: 6px 10px; background: var(--dp-surface); border-bottom: 0.5px solid var(--dp-border); overflow-x: auto; scrollbar-width: none; }
  .dp-tab { background: none; border: none; cursor: pointer; padding: 5px 10px; border-radius: var(--border-radius-md); font-size: 12px; font-family: var(--font-sans); color: var(--dp-muted); white-space: nowrap; transition: all 0.12s; display: flex; align-items: center; gap: 5px; }
  .dp-tab:hover { background: var(--dp-bg); color: var(--dp-text); }
  .dp-tab.active { background: var(--dp-bg); color: var(--dp-text); font-weight: 500; }
  .dp-tab-dot { width: 5px; height: 5px; border-radius: 50%; }
  .dp-feed { padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  .dp-card { background: var(--dp-surface); border: 0.5px solid var(--dp-border); border-radius: var(--border-radius-lg); padding: 12px 14px; cursor: pointer; transition: border-color 0.12s; border-left-width: 2px; text-decoration: none; display: block; color: inherit; }
  .dp-card:hover { border-color: var(--dp-border-hover); }
  .dp-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .dp-card-title { font-size: 13px; font-weight: 500; color: var(--dp-text); line-height: 1.4; flex: 1; }
  .dp-card-stat { font-family: var(--font-mono); font-size: 11px; color: var(--dp-muted); white-space: nowrap; margin-top: 2px; }
  .dp-card-meta { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
  .dp-meta-item { font-size: 11px; color: var(--dp-hint); display: flex; align-items: center; gap: 3px; }
  .dp-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-bottom: 5px; font-weight: 500; letter-spacing: 0.3px; }
  .dp-tags { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; }
  .dp-tag { font-size: 10px; color: var(--dp-hint); background: var(--dp-bg); padding: 2px 7px; border-radius: 10px; border: 0.5px solid var(--dp-border); }
  .dp-skeleton { background: var(--dp-bg); border-radius: var(--border-radius-md); animation: dp-shimmer 1.4s infinite; }
  @keyframes dp-shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }
  .dp-empty { text-align: center; padding: 40px 20px; color: var(--dp-muted); font-size: 13px; }
  .dp-footer { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; border-top: 0.5px solid var(--dp-border); background: var(--dp-surface); }
  .dp-footer-text { font-size: 11px; color: var(--dp-hint); }
  .dp-refresh-btn { background: none; border: 0.5px solid var(--dp-border); color: var(--dp-muted); font-size: 11px; padding: 3px 9px; border-radius: var(--border-radius-md); cursor: pointer; font-family: var(--font-sans); }
  .dp-refresh-btn:hover { background: var(--dp-bg); }
  .dp-ticker { overflow: hidden; background: var(--dp-bg); border-bottom: 0.5px solid var(--dp-border); height: 24px; display: flex; align-items: center; }
  .dp-ticker-inner { display: flex; white-space: nowrap; will-change: transform; }
  .dp-ticker-item { font-size: 11px; font-family: var(--font-mono); color: var(--dp-hint); padding: 0 20px; border-right: 0.5px solid var(--dp-border); }
</style>

<h2 class="sr-only">DevPulse — live developer feed with real data from HN, DEV.to, GitHub, and more</h2>
<div id="dp-root">
  <div class="dp-header">
    <div class="dp-brand">
      <span class="dp-logo">DevPulse</span>
      <div class="dp-dot"></div>
      <span id="dp-status" style="font-size:11px;color:var(--dp-hint)">loading...</span>
    </div>
    <div class="dp-timer">
      <i class="ti ti-clock" aria-hidden="true" style="font-size:13px"></i>
      <span>build running</span>
      <span class="dp-timer-val" id="dp-timer">0s</span>
    </div>
  </div>
  <div class="dp-ticker"><div class="dp-ticker-inner" id="dp-ticker-inner">
    <span class="dp-ticker-item">⟨/⟩ loading live data...</span>
  </div></div>
  <div class="dp-tabs" id="dp-tabs"></div>
  <div id="dp-feed" class="dp-feed"></div>
  <div class="dp-footer">
    <span class="dp-footer-text" id="dp-footer-text">fetching...</span>
    <button class="dp-refresh-btn" onclick="refreshTab()"><i class="ti ti-refresh" aria-hidden="true"></i> refresh</button>
  </div>
</div>

<script>
const TABS = [
  { id:'hn',     label:'HN',       icon:'ti-brand-y-combinator', color:'#BA7517',  dot:'#EF9F27' },
  { id:'devto',  label:'DEV.to',   icon:'ti-brand-dev-to',       color:'#534AB7',  dot:'#7F77DD' },
  { id:'github', label:'GitHub',   icon:'ti-brand-github',       color:'#1D9E75',  dot:'#1D9E75' },
  { id:'jobs',   label:'Jobs',     icon:'ti-briefcase',          color:'#185FA5',  dot:'#378ADD' },
  { id:'news',   label:'News',     icon:'ti-news',               color:'#993C1D',  dot:'#D85A30' },
  { id:'learn',  label:'Learn',    icon:'ti-bulb',               color:'#3B6D11',  dot:'#639922' },
];

const CORS = 'https://api.allorigins.win/get?url=';
let cache = {}, activeTab = 'hn', timerStart = Date.now(), fetchedAt = {};

function buildTabs() {
  const el = document.getElementById('dp-tabs');
  el.innerHTML = TABS.map(t => `
    <button class="dp-tab${t.id===activeTab?' active':''}" onclick="switchTab('${t.id}')" id="tab-${t.id}">
      <i class="ti ${t.icon}" aria-hidden="true" style="font-size:13px;color:${t.color}"></i>
      ${t.label}
      <span class="dp-tab-dot" style="background:${t.dot};opacity:${cache[t.id]?'1':'0.3'}"></span>
    </button>`).join('');
}

function switchTab(id) {
  activeTab = id;
  buildTabs();
  if (cache[id]) renderFeed(cache[id], id);
  else fetchTab(id);
}

function refreshTab() {
  delete cache[activeTab];
  fetchTab(activeTab);
}

function setStatus(msg) { document.getElementById('dp-status').textContent = msg; }
function setFooter(msg) { document.getElementById('dp-footer-text').textContent = msg; }

function renderSkeleton() {
  const feed = document.getElementById('dp-feed');
  feed.innerHTML = [1,2,3,4].map(() => `
    <div style="background:var(--dp-surface);border:0.5px solid var(--dp-border);border-radius:var(--border-radius-lg);padding:12px 14px">
      <div class="dp-skeleton" style="height:10px;width:60px;margin-bottom:8px"></div>
      <div class="dp-skeleton" style="height:13px;width:90%;margin-bottom:6px"></div>
      <div class="dp-skeleton" style="height:11px;width:50%"></div>
    </div>`).join('');
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const h = Math.floor(diff/3600000);
  if (h < 1) return Math.floor(diff/60000) + 'm ago';
  if (h < 24) return h + 'h ago';
  return Math.floor(h/24) + 'd ago';
}

function renderFeed(items, tabId) {
  const tab = TABS.find(t=>t.id===tabId);
  const feed = document.getElementById('dp-feed');
  if (!items || !items.length) {
    feed.innerHTML = `<div class="dp-empty"><i class="ti ti-inbox" style="font-size:24px;display:block;margin-bottom:8px" aria-hidden="true"></i>No items found</div>`;
    return;
  }
  feed.innerHTML = items.map(item => `
    <a class="dp-card" href="${item.url||'#'}" target="_blank" rel="noopener" style="border-left-color:${tab.color}" aria-label="${item.title}">
      ${item.badge ? `<span class="dp-badge" style="background:${tab.color}18;color:${tab.color}">${item.badge}</span>` : ''}
      <div class="dp-card-top">
        <div class="dp-card-title">${item.title}</div>
        ${item.stat ? `<div class="dp-card-stat">${item.stat}</div>` : ''}
      </div>
      ${item.meta?.length ? `<div class="dp-card-meta">${item.meta.map(m=>`<span class="dp-meta-item">${m}</span>`).join('')}</div>` : ''}
      ${item.tags?.length ? `<div class="dp-tags">${item.tags.slice(0,4).map(t=>`<span class="dp-tag">#${t}</span>`).join('')}</div>` : ''}
    </a>`).join('');
  const ts = fetchedAt[tabId] ? new Date(fetchedAt[tabId]).toLocaleTimeString() : '';
  setFooter(`${items.length} items · synced ${ts}`);
}

async function fetchHN() {
  const res = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
  const ids = await res.json();
  const top = ids.slice(0,12);
  const stories = await Promise.all(top.map(id =>
    fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r=>r.json())
  ));
  return stories.filter(s=>s&&s.title).map(s => ({
    title: s.title,
    url: s.url || `https://news.ycombinator.com/item?id=${s.id}`,
    badge: s.type === 'ask' ? 'Ask HN' : s.type === 'show' ? 'Show HN' : 'HN',
    stat: `▲ ${s.score||0}`,
    meta: [`${s.descendants||0} comments`, timeAgo(new Date(s.time*1000).toISOString()), s.by],
    tags: [],
  }));
}

async function fetchDevTo() {
  const res = await fetch('https://dev.to/api/articles?top=7&per_page=12');
  const data = await res.json();
  return data.map(a => ({
    title: a.title,
    url: a.url,
    badge: a.tag_list?.[0] || 'DEV',
    stat: `♥ ${a.positive_reactions_count||0}`,
    meta: [timeAgo(a.published_at), a.user?.name || 'author', `${a.reading_time_minutes||1} min read`],
    tags: a.tag_list?.slice(0,4) || [],
  }));
}

async function fetchGitHub() {
  const queries = ['stars:>1000 pushed:>2026-01-01','language:typescript stars:>500','topic:ai stars:>200'];
  const q = queries[Math.floor(Math.random()*queries.length)];
  const res = await fetch(`https://api.github.com/search/repositories?q=${encodeURIComponent(q)}&sort=stars&order=desc&per_page=12`);
  const data = await res.json();
  return (data.items||[]).map(r => ({
    title: r.full_name,
    url: r.html_url,
    badge: r.language || 'GitHub',
    stat: `★ ${(r.stargazers_count||0).toLocaleString()}`,
    meta: [r.license?.spdx_id||'no license', timeAgo(r.pushed_at), `${(r.forks_count||0).toLocaleString()} forks`],
    tags: (r.topics||[]).slice(0,4),
  }));
}

async function fetchJobs() {
  const res = await fetch('https://hacker-news.firebaseio.com/v0/jobstories.json');
  const ids = await res.json();
  const top = ids.slice(0,12);
  const jobs = await Promise.all(top.map(id =>
    fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r=>r.json())
  ));
  return jobs.filter(j=>j&&j.title).map(j => ({
    title: j.title,
    url: j.url || `https://news.ycombinator.com/item?id=${j.id}`,
    badge: 'YC Job',
    stat: timeAgo(new Date(j.time*1000).toISOString()),
    meta: [j.by],
    tags: [],
  }));
}

async function fetchNews() {
  const topics = ['programming','software development','open source','developer tools'];
  const topic = topics[Math.floor(Math.random()*topics.length)];
  const url = `https://devapi.currentsapi.services/v1/latest-news?language=en&category=technology&page_size=12&apiKey=DEMO`;
  try {
    const res = await fetch(`${CORS}${encodeURIComponent(`https://currentsapi.services/v1/latest-news?language=en&category=technology`)}`);
    const wrapper = await res.json();
    const data = JSON.parse(wrapper.contents);
    if (data.news?.length) {
      return data.news.map(n => ({
        title: n.title,
        url: n.url,
        badge: n.category?.[0] || 'Tech',
        stat: timeAgo(n.published),
        meta: [n.author || n.source || 'source'],
        tags: n.category?.slice(0,3) || [],
      }));
    }
  } catch(e) {}
  const res2 = await fetch('https://dev.to/api/articles?tag=news&per_page=10');
  const data2 = await res2.json();
  return data2.map(a => ({
    title: a.title,
    url: a.url,
    badge: 'Tech News',
    stat: `♥ ${a.positive_reactions_count||0}`,
    meta: [timeAgo(a.published_at), a.user?.name || 'author'],
    tags: a.tag_list?.slice(0,4) || [],
  }));
}

async function fetchLearn() {
  const topics = [
    {q:'What is a useful, lesser-known JavaScript array method with a concrete code example?'},
    {q:'Explain one powerful Git trick most developers don\'t know, with the exact command.'},
    {q:'What\'s a CSS trick that solves a common layout problem? Show the code.'},
    {q:'Name one terminal command that saves time in daily development. Explain it.'},
    {q:'Explain one TypeScript pattern that makes code significantly safer.'},
    {q:'What\'s a useful SQL query pattern developers often don\'t know?'},
  ];
  const picks = topics.sort(()=>Math.random()-0.5).slice(0,5);
  try {
    const results = await Promise.all(picks.map(async ({q}) => {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:200,
          system:'You are a developer tip generator. Give ONE short, genuinely useful tip. Start directly with the tip — no preamble. Max 3 sentences. Include a code snippet if relevant (keep it short, inline). Output plain text only.',
          messages:[{role:'user',content:q}]
        })
      });
      const d = await res.json();
      const text = d.content?.[0]?.text || '';
      return {
        title: q.replace('What is ','').replace('Explain one ','').replace('What\'s a ','').replace('Name one ','').replace('?','').slice(0,60)+'...',
        url: null,
        badge: 'TIL',
        stat: '2 min',
        meta: ['Claude · AI generated'],
        tags: ['devtips'],
        preview: text,
      };
    }));
    return results;
  } catch(e) {
    return [{title:'Could not load learn tips — check your API connection', url:null, badge:'ERR', stat:'', meta:[], tags:[]}];
  }
}

async function fetchTab(tabId) {
  renderSkeleton();
  setStatus('fetching...');
  const fetchers = { hn:fetchHN, devto:fetchDevTo, github:fetchGitHub, jobs:fetchJobs, news:fetchNews, learn:fetchLearn };
  try {
    const items = await fetchers[tabId]();
    cache[tabId] = items;
    fetchedAt[tabId] = Date.now();
    renderFeed(items, tabId);
    setStatus(`live · ${new Date().toLocaleTimeString()}`);
    updateTicker();
    buildTabs();
  } catch(e) {
    document.getElementById('dp-feed').innerHTML = `<div class="dp-empty"><i class="ti ti-wifi-off" style="font-size:24px;display:block;margin-bottom:8px" aria-hidden="true"></i>Could not fetch — try refreshing<br><small style="color:var(--dp-hint);margin-top:4px;display:block">${e.message}</small></div>`;
    setStatus('error');
  }
}

function updateTicker() {
  const all = Object.values(cache).flat();
  if (!all.length) return;
  const items = all.sort(()=>Math.random()-0.5).slice(0,10);
  const inner = document.getElementById('dp-ticker-inner');
  const html = [...items,...items].map(i => `<span class="dp-ticker-item">${i.stat||''} ${i.title.slice(0,50)}${i.title.length>50?'…':''}</span>`).join('');
  inner.innerHTML = html;
  let x = 0;
  const totalW = inner.scrollWidth / 2;
  function tick() {
    x -= 0.5;
    if (Math.abs(x) >= totalW) x = 0;
    inner.style.transform = `translateX(${x}px)`;
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

setInterval(() => {
  const s = Math.floor((Date.now()-timerStart)/1000);
  const el = document.getElementById('dp-timer');
  if(el) el.textContent = s < 60 ? s+'s' : Math.floor(s/60)+'m '+s%60+'s';
}, 500);

buildTabs();
fetchTab('hn');
</script>
